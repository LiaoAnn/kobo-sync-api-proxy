services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AUTO_MIGRATE_ON_START: ${AUTO_MIGRATE_ON_START:-true}
      PORT: ${PORT:-5678}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-kobo}}
    ports:
      - "${PORT:-5678}:${PORT:-5678}"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-kobo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-kobo}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
